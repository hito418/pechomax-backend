version: '3'

services:
  postgres:
    image: postgres:16.1-alpine
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: pechomax_db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pguser -d pechomax_db']
      interval: 5s
      timeout: 5s
      retries: 10
